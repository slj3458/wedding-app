version: "3.8"

services:
  wedding-app:
    build: .
    container_name: wedding-reception-app
    ports:
      - "8080:8080"
    volumes:
      # Persist uploads and database
      - ./uploads:/app/uploads
      - ./thumbnails:/app/thumbnails
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_UPLOAD_SIZE=10485760 # 10MB
    restart: unless-stopped
    networks:
      - wedding-net

  # Optional: Add nginx for frontend serving
  nginx:
    image: nginx:alpine
    container_name: wedding-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wedding-app
    restart: unless-stopped
    networks:
      - wedding-net

networks:
  wedding-net:
    driver: bridge
